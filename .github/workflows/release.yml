name: Release

# Builds Limit.app on a macOS runner and publishes a self-contained installer
# (Limit.app + install.sh + watchdog.sh, zipped) as a GitHub Release asset.
# scripts/bootstrap.sh downloads that asset, so the family Macs never need Xcode.
#
# Cut a release by pushing a tag:   git tag v0.1.0 && git push origin v0.1.0
# Or run manually from the Actions tab (supply the tag to attach the asset to).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build and attach the installer to (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    # macos-15 ships Xcode 16; XcodeGen emits objectVersion 77 (Xcode 16 format),
    # which older Xcode (e.g. 15.4 on macos-14) cannot open.
    runs-on: macos-15
    steps:
      - name: Check out the requested ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build Limit.app (Release)
        run: |
          set -euxo pipefail
          xcodebuild \
            -project LimitApp.xcodeproj \
            -scheme LimitApp \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES \
            build

      - name: Stage the installer bundle
        run: |
          set -euxo pipefail
          APP="build/Build/Products/Release/Limit.app"
          test -d "$APP"
          rm -rf dist && mkdir -p dist/limit-installer
          cp -R "$APP" dist/limit-installer/
          cp scripts/install.sh scripts/watchdog.sh dist/limit-installer/
          chmod +x dist/limit-installer/install.sh dist/limit-installer/watchdog.sh
          ( cd dist/limit-installer && zip -ry ../limit-installer.zip Limit.app install.sh watchdog.sh )
          ls -la dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: dist/limit-installer.zip
          fail_on_unmatched_files: true
          generate_release_notes: true
